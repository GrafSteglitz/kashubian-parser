[bumpversion]
current_version = 0.4.0
commit = False
tag = False

[bumpversion:file:setup.py]

[wheel]
universal = 1

[flake8]
exclude = .venv, analyser_discards.py, word.py, experiments.py, corpus_xml.py
max-line-length=120
application-import-names = tests
import-order-style = smarkets
max-complexity = 10
show-source = True
statistics = True

